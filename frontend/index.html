<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Fiscal AI — European company financials</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115;
    --panel: #161a22;
    --panel-2: #1d2230;
    --border: #2a3142;
    --text: #e7eaf0;
    --muted: #9aa3b2;
    --accent: #6aa6ff;
    --accent-2: #8a7bff;
    --good: #4cd58c;
    --warn: #f0b649;
    --bad: #ff6e7d;
    --header-bg: linear-gradient(180deg, #181c25, #11141b);
    --button-text: #0c1322;
  }
  body[data-theme="light"] {
    --bg: #f7f8fb;
    --panel: #ffffff;
    --panel-2: #eef2f7;
    --border: #d9e0ec;
    --text: #151923;
    --muted: #5f6c7d;
    --accent: #2f6ec9;
    --accent-2: #5c55d6;
    --good: #138a51;
    --warn: #a26500;
    --bad: #c93748;
    --header-bg: #ffffff;
    --button-text: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg); color: var(--text);
  }
  header {
    padding: 18px 24px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 16px;
    background: var(--header-bg);
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: .2px; }
  header .sub { color: var(--muted); font-size: 12px; }
  header .spacer { flex: 1; }
  .cost {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 10px;
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
    color: var(--muted); white-space: nowrap;
    position: relative;
  }
  .cost .amount { color: var(--good); font-weight: 600; font-size: 13px; }
  .cost .label { color: var(--muted); }
  .cost .reset {
    background: transparent; border: 1px solid var(--border); color: var(--muted);
    border-radius: 6px; padding: 2px 8px; cursor: pointer; font-size: 11px;
  }
  .cost .reset:hover { color: var(--text); border-color: var(--accent); }
  .cost .details {
    position: absolute; top: calc(100% + 6px); right: 0;
    background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
    padding: 10px 12px; min-width: 240px;
    display: none; z-index: 10; color: var(--muted);
  }
  .cost:hover .details { display: block; }
  .cost .details .row { display: flex; justify-content: space-between; padding: 2px 0; }
  .cost .details .row b { color: var(--text); font-weight: 500; }
  .saved-select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 8px; font-size: 12px;
  }
  .theme-toggle {
    background: var(--panel); color: var(--text); border: 1px solid var(--border);
    border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .theme-toggle:hover { border-color: var(--accent); }
  main { padding: 20px 24px 60px; max-width: 1500px; margin: 0 auto; }

  .controls { display: flex; gap: 10px; margin-bottom: 18px; }
  .controls input {
    flex: 1; padding: 10px 12px; background: var(--panel); color: var(--text);
    border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
  }
  .controls button {
    padding: 10px 16px; background: var(--accent); color: var(--button-text); border: none;
    border-radius: 8px; font-weight: 600; cursor: pointer;
  }
  .controls button:disabled { opacity: .55; cursor: progress; }

  .progress { background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
              padding: 12px 14px; margin-bottom: 18px; max-height: 220px; overflow: auto;
              font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 12px;
              color: var(--muted); }
  .progress .row { display: flex; gap: 8px; padding: 2px 0; }
  .progress .stage { color: var(--accent); min-width: 130px; }
  .progress .cost-line .stage { color: var(--good); }
  .progress .err { color: var(--bad); }
  .statusbar {
    display: none; align-items: center; gap: 10px;
    color: var(--muted); margin: -6px 0 14px; font-size: 13px;
  }
  .statusbar.active { display: flex; }
  .spinner {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--border); border-top-color: var(--accent);
    animation: spin .85s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tabs { display: flex; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 12px; flex-wrap: wrap; }
  .tab {
    padding: 8px 14px; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent;
    user-select: none;
  }
  .tab.active { color: var(--text); border-bottom-color: var(--accent); }

  .meta { color: var(--muted); margin: 6px 0 14px; font-size: 13px; }
  .meta b { color: var(--text); font-weight: 500; }
  .meta-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .export {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    border-radius: 7px; padding: 5px 9px; cursor: pointer; font-size: 12px;
  }
  .export:hover { border-color: var(--accent); }

  table.statement {
    width: 100%; border-collapse: collapse; background: var(--panel);
    border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  table.statement th, table.statement td {
    padding: 8px 12px; border-bottom: 1px solid var(--border); text-align: right;
    font-variant-numeric: tabular-nums; white-space: nowrap;
  }
  table.statement th:first-child, table.statement td:first-child { text-align: left; }
  table.statement thead th {
    background: var(--panel-2); font-weight: 600; color: var(--text);
    position: sticky; top: 0; z-index: 1;
  }
  table.statement tr.section td {
    background: rgba(106, 166, 255, 0.08); font-weight: 600; color: var(--text);
  }
  table.statement tr.subtotal td { font-weight: 600; border-top: 1px solid var(--border); }
  table.statement td.label { color: var(--text); }
  table.statement td.label.indent-1 { padding-left: 28px; color: var(--text); }
  table.statement td.label.indent-2 { padding-left: 44px; color: var(--muted); }
  table.statement td.num.neg { color: var(--bad); }
  table.statement td.num.empty { color: #485066; }

  .note { color: var(--muted); font-size: 12px; margin-top: 10px; }
  .pill { display: inline-block; background: var(--panel-2); border: 1px solid var(--border);
          color: var(--muted); padding: 2px 8px; border-radius: 999px; font-size: 11px; }
  details.raw { margin-top: 16px; }
  details.raw summary { color: var(--muted); cursor: pointer; }
  details.raw pre { background: var(--panel); padding: 10px; border-radius: 8px; overflow: auto;
                    font-size: 11px; max-height: 300px; }
</style>
</head>
<body>
<header>
  <h1>Fiscal AI</h1>
  <span class="sub">Public-company financial statements, extracted from primary sources</span>
  <div class="spacer"></div>
  <button class="theme-toggle" id="theme" type="button" aria-label="Toggle theme"></button>
  <div class="cost" id="cost" title="Estimated OpenAI spend this session">
    <span class="label">spend</span>
    <span class="amount" id="cost-amount">$0.0000</span>
    <span class="label" id="cost-tokens">0 in / 0 out</span>
    <button class="reset" id="cost-reset" type="button">reset</button>
    <div class="details" id="cost-details"></div>
  </div>
</header>
<main>
  <div class="controls">
    <input id="companies" placeholder="Company names, comma-separated (e.g., Heineken, Adyen)" />
    <button id="run">Generate report</button>
  </div>
  <div class="controls" id="saved-row" style="display:none">
    <select class="saved-select" id="saved-reports"></select>
    <button id="load-saved" type="button">Load saved report</button>
  </div>

  <div class="progress" id="progress" style="display:none"></div>
  <div class="statusbar" id="statusbar"><span class="spinner"></span><span id="status-text">Working…</span></div>

  <div id="tabs-companies" class="tabs"></div>
  <div id="result"></div>
</main>

<script>
const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => [...r.querySelectorAll(s)];
const STMT_LABELS = {
  income_statement: "Income Statement",
  balance_sheet: "Balance Sheet",
  cash_flow: "Cash Flow Statement",
};

const state = {
  jobId: null,
  results: {},
  activeCompany: null,
  activeStatement: "income_statement",
  running: false,
  cost: null,
  savedReports: [],
  eventCount: 0,
  eventSource: null,
};

$("#run").addEventListener("click", run);
$("#companies").addEventListener("keydown", e => { if (e.key === "Enter") run(); });
$("#load-saved").addEventListener("click", loadSelectedSavedReport);
$("#theme").addEventListener("click", () => {
  setTheme(document.body.dataset.theme === "light" ? "dark" : "light");
});

function setTheme(theme) {
  const next = theme === "light" ? "light" : "dark";
  document.body.dataset.theme = next;
  $("#theme").textContent = next === "light" ? "☀️" : "🌙";
  localStorage.setItem("fiscal-theme", next);
}

setTheme(localStorage.getItem("fiscal-theme") || "dark");

async function run() {
  const raw = $("#companies").value.trim();
  if (!raw) return;
  const companies = raw.split(",").map(s => s.trim()).filter(Boolean);
  if (!companies.length) return;

  state.results = {};
  state.activeCompany = null;
  state.running = true;
  $("#tabs-companies").innerHTML = "";
  $("#result").innerHTML = "";
  $("#progress").style.display = "block";
  $("#progress").innerHTML = "";
  $("#run").disabled = true;
  updateStatus("Starting report…");

  const r = await fetch("/api/reports", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({companies}),
  });
  const j = await r.json();
  state.jobId = j.job_id;
  state.eventCount = 0;

  for (const c of companies) addCompanyTab(c);
  if (companies.length) selectCompany(companies[0]);

  openEventStream(j.job_id, 0);
}

function openEventStream(jobId, since) {
  if (state.eventSource) state.eventSource.close();
  const es = new EventSource(`/api/reports/${jobId}/events?since=${since || 0}`);
  state.eventSource = es;
  es.addEventListener("progress", e => { state.eventCount += 1; onProgress(JSON.parse(e.data)); });
  es.addEventListener("cost_update", e => { state.eventCount += 1; onCostUpdate(JSON.parse(e.data)); });
  es.addEventListener("company_done", e => { state.eventCount += 1; onCompanyDone(JSON.parse(e.data)); });
  es.addEventListener("company_error", e => { state.eventCount += 1; onCompanyError(JSON.parse(e.data)); });
  es.addEventListener("retry_started", e => { state.eventCount += 1; onRetryStarted(JSON.parse(e.data)); });
  es.addEventListener("all_done", async () => {
    state.eventCount += 1;
    es.close();
    if (state.eventSource === es) state.eventSource = null;
    $("#run").disabled = false;
    state.running = false;
    await refreshCurrentReport();
    updateStatus("");
    loadSavedReports();
  });
}

function updateStatus(text) {
  const bar = $("#statusbar");
  if (!text || !state.running) {
    bar.classList.remove("active");
    $("#status-text").textContent = "";
    return;
  }
  $("#status-text").textContent = text;
  bar.classList.add("active");
}

function addCompanyTab(name) {
  const t = document.createElement("div");
  t.className = "tab";
  t.dataset.company = name;
  t.innerHTML = `${name} <span class="pill" data-status>queued</span>`;
  t.addEventListener("click", () => selectCompany(name));
  $("#tabs-companies").appendChild(t);
}

function setStatus(name, status) {
  const tab = $(`#tabs-companies .tab[data-company="${cssEscape(name)}"] [data-status]`);
  if (tab) tab.textContent = status;
}

function cssEscape(s){ return (window.CSS && CSS.escape) ? CSS.escape(s) : s.replace(/"/g,'\\"'); }

function selectCompany(name) {
  state.activeCompany = name;
  $$("#tabs-companies .tab").forEach(t => t.classList.toggle("active", t.dataset.company === name));
  renderResult();
}

function onProgress(ev) {
  appendConsole(`[${ev.company}] ${ev.stage}`, summarize(ev.data), ev.data && ev.data.error);
  setStatus(ev.company, ev.stage);
  if (state.activeCompany === ev.company && !state.results[ev.company]) {
    renderResult();
  }
  if (ev.data && ev.data.message) updateStatus(`${ev.company}: ${ev.data.message}`);
}

function appendConsole(stageText, detailText, isError=false, cls="") {
  const line = document.createElement("div");
  line.className = `row ${cls || ""}`;
  const stage = document.createElement("span");
  stage.className = "stage";
  stage.textContent = stageText;
  const detail = document.createElement("span");
  if (isError) detail.className = "err";
  detail.textContent = detailText || "";
  line.appendChild(stage); line.appendChild(detail);
  $("#progress").appendChild(line);
  $("#progress").scrollTop = $("#progress").scrollHeight;
}

function summarize(data) {
  if (!data) return "";
  const copy = {...data};
  delete copy.company;
  if (copy.info) return `${copy.info.name} (${copy.info.ticker}) — IR: ${copy.info.ir_url}`;
  if (copy.candidate_count != null) return `${copy.candidate_count} PDFs found`;
  if (copy.annual_count != null) return `${copy.annual_count} annual reports kept`;
  if (copy.chunk != null && copy.classified_count != null) return `chunk ${copy.chunk}/${copy.chunks}: ${copy.classified_count} PDFs classified`;
  if (copy.chunk != null && copy.attempt != null) return `chunk ${copy.chunk}/${copy.chunks}: retry ${copy.attempt} — ${copy.error || ""}`;
  if (copy.chunk != null && copy.count != null) return `chunk ${copy.chunk}/${copy.chunks}: fallback classified ${copy.count} PDFs${copy.error ? " — " + copy.error : ""}`;
  if (copy.chunk != null) return `chunk ${copy.chunk}/${copy.chunks}: ${copy.count || 0} PDFs`;
  if (copy.found != null && copy.verified != null && copy.kept != null) return `web search: ${copy.found} candidates → ${copy.verified} verified → ${copy.kept} kept`;
  if (copy.year != null) return `year ${copy.year}${copy.error ? " — " + copy.error : ""}`;
  if (copy.message) return copy.message;
  if (copy.statements_summary) return Object.entries(copy.statements_summary).map(([k,v])=>`${k}:${v}`).join(", ");
  if (copy.found) return Object.entries(copy.found).map(([k,v])=>`${k}:${v ? "found" : "missing"}`).join(", ");
  return "";
}

function onCostUpdate(ev) {
  const c = ev.cost || {};
  appendConsole("[cost]", `+${fmtUsd(ev.delta_usd || 0)} · total ${fmtUsd(c.usd || 0)} · ${fmtTokens(c.input_tokens)} in / ${fmtTokens(c.output_tokens)} out`, false, "cost-line");
  renderCost(c);
}

function onRetryStarted(ev) {
  setStatus(ev.company, "retrying");
  appendConsole(`[${ev.company}] retry`, "Manual retry started");
  updateStatus(`${ev.company}: retrying report…`);
}

async function onCompanyDone(ev) {
  setStatus(ev.company, "ready");
  await refreshCurrentReport();
  if (state.activeCompany === ev.company) renderResult();
}

async function onCompanyError(ev) {
  setStatus(ev.company, "error");
  appendConsole(`[${ev.company}] error`, ev.error || "Report failed", true);
  await refreshCurrentReport();
  if (state.activeCompany === ev.company) renderResult();
}

async function refreshCurrentReport() {
  if (!state.jobId) return null;
  const r = await fetch(`/api/reports/${state.jobId}`);
  if (!r.ok) return null;
  const j = await r.json();
  state.results = j.results || {};
  return j;
}

function renderResult() {
  const el = $("#result");
  const name = state.activeCompany;
  if (!name) { el.innerHTML = ""; return; }
  const data = state.results[name];
  if (!data) {
    el.innerHTML = `<div class="meta"><span class="spinner" style="display:inline-block;vertical-align:-2px;margin-right:8px"></span>Working on ${name}…</div>`;
    return;
  }
  if (data.error) {
    el.innerHTML = `<div class="meta meta-actions">
      <span>Error: ${escapeHtml(data.error)}</span>
      <button class="export" id="retry-company" type="button">Retry</button>
    </div>`;
    $("#retry-company").addEventListener("click", retryActiveCompany);
    return;
  }
  const company = data.company || {};
  const stmts = data.statements || {};

  let html = `<div class="meta meta-actions">
    <span><b>${escapeHtml(company.name||name)}</b>
      &middot; ${escapeHtml(company.ticker||"")}
      &middot; ${escapeHtml(company.exchange||"")}
      &middot; ${escapeHtml(company.country||"")}
      &middot; <a href="${escapeAttr(company.ir_url||"#")}" target="_blank" rel="noopener" style="color:var(--accent)">IR site</a>
    </span>
    <button class="export" id="export-pdf" type="button">Export PDF</button>
  </div>`;

  html += `<div class="tabs" id="tabs-stmt">`;
  for (const k of Object.keys(STMT_LABELS)) {
    html += `<div class="tab ${k===state.activeStatement?"active":""}" data-stmt="${k}">${STMT_LABELS[k]}</div>`;
  }
  html += `</div>`;
  html += `<div id="stmt-body"></div>`;
  html += `<details class="raw"><summary>Raw merged JSON</summary><pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre></details>`;
  el.innerHTML = html;

  $$("#tabs-stmt .tab").forEach(t => t.addEventListener("click", () => {
    state.activeStatement = t.dataset.stmt;
    renderResult();
  }));
  $("#export-pdf").addEventListener("click", exportActiveCompany);

  renderStatement(stmts[state.activeStatement]);
}

function exportActiveCompany() {
  if (!state.jobId || !state.activeCompany) return;
  const url = `/api/reports/${encodeURIComponent(state.jobId)}/companies/${encodeURIComponent(state.activeCompany)}/export.pdf`;
  window.open(url, "_blank", "noopener");
}

async function retryActiveCompany() {
  if (!state.jobId || !state.activeCompany || state.running) return;
  const company = state.activeCompany;
  const btn = $("#retry-company");
  if (btn) btn.disabled = true;
  state.running = true;
  state.results[company] = null;
  setStatus(company, "retrying");
  renderResult();
  updateStatus(`${company}: retrying report…`);

  try {
    const r = await fetch(`/api/reports/${encodeURIComponent(state.jobId)}/companies/${encodeURIComponent(company)}/retry`, {method: "POST"});
    if (!r.ok) {
      const msg = await r.text();
      throw new Error(msg || `Retry failed with ${r.status}`);
    }
    const j = await r.json();
    openEventStream(state.jobId, j.event_count ?? state.eventCount);
  } catch (err) {
    state.running = false;
    state.results[company] = {error: err.message || String(err)};
    setStatus(company, "error");
    updateStatus("");
    renderResult();
  }
}

function renderStatement(s) {
  const body = $("#stmt-body");
  if (!s || !s.rows || !s.rows.length) {
    body.innerHTML = `<div class="meta">No data extracted for this statement yet.</div>`;
    return;
  }
  const periods = s.periods || [];
  const fmt = v => {
    if (v == null) return {text: "—", cls: "empty"};
    const n = Number(v);
    if (!isFinite(n)) return {text: String(v), cls: ""};
    const abs = Math.abs(n);
    const text = abs >= 1000 ? n.toLocaleString(undefined, {maximumFractionDigits: 0})
                              : n.toLocaleString(undefined, {maximumFractionDigits: 2});
    return {text, cls: n < 0 ? "neg" : ""};
  };

  let html = `<div class="meta">Currency: <b>${escapeHtml(s.currency||"?")}</b> &middot; Unit: <b>${escapeHtml(s.unit||"")}</b></div>`;
  html += `<table class="statement"><thead><tr><th></th>`;
  for (const p of periods) {
    html += `<th>${escapeHtml(p.label || p.period_end)}</th>`;
  }
  html += `</tr></thead><tbody>`;
  for (const r of s.rows) {
    const cls = [];
    if (r.is_section_header) cls.push("section");
    if (r.is_subtotal) cls.push("subtotal");
    const indent = Math.min(r.indent_level||0, 2);
    html += `<tr class="${cls.join(" ")}">`;
    html += `<td class="label indent-${indent}">${escapeHtml(r.label)}</td>`;
    for (const v of r.values) {
      const f = fmt(v);
      html += `<td class="num ${f.cls}">${escapeHtml(f.text)}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody></table>`;
  html += `<div class="note">Each cell is the most recent restatement available for that period across the company's annual reports.</div>`;
  body.innerHTML = html;
}

function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function escapeAttr(s){ return escapeHtml(s); }

function fmtTokens(n) {
  n = Number(n) || 0;
  if (n >= 1e6) return (n / 1e6).toFixed(2) + "M";
  if (n >= 1e3) return (n / 1e3).toFixed(1) + "k";
  return String(n);
}
function fmtUsd(n) {
  n = Number(n) || 0;
  if (n >= 1)  return "$" + n.toFixed(2);
  return "$" + n.toFixed(4);
}

function renderCost(j) {
  state.cost = j;
  $("#cost-amount").textContent = fmtUsd(j.usd);
  $("#cost-tokens").textContent =
    `${fmtTokens(j.input_tokens)} in / ${fmtTokens(j.output_tokens)} out`;
  const det = $("#cost-details");
  const rows = [
    ["Calls",            j.calls],
    ["Input tokens",     j.input_tokens.toLocaleString()],
    ["  cached",         (j.cached_input_tokens||0).toLocaleString()],
    ["Output tokens",    j.output_tokens.toLocaleString()],
    ["  reasoning",      (j.reasoning_tokens||0).toLocaleString()],
    ["Estimated cost",   fmtUsd(j.usd)],
  ];
  let html = rows.map(([k,v]) => `<div class="row"><span>${escapeHtml(k)}</span><b>${escapeHtml(v)}</b></div>`).join("");
  const models = Object.keys(j.by_model || {});
  if (models.length) {
    html += `<div class="row" style="margin-top:6px;border-top:1px solid var(--border);padding-top:6px"><span>By model</span><b></b></div>`;
    for (const m of models) {
      const mm = j.by_model[m];
      html += `<div class="row"><span>${escapeHtml(m)}</span><b>${fmtUsd(mm.usd)} · ${fmtTokens(mm.input_tokens)}/${fmtTokens(mm.output_tokens)}</b></div>`;
    }
  }
  det.innerHTML = html;
}

async function refreshCost() {
  try {
    const r = await fetch("/api/cost");
    if (!r.ok) return;
    const j = await r.json();
    if (state.running && state.cost && Number(j.usd || 0) > Number(state.cost.usd || 0)) {
      appendConsole("[cost]", `+${fmtUsd(Number(j.usd || 0) - Number(state.cost.usd || 0))} · total ${fmtUsd(j.usd)}`, false, "cost-line");
    }
    renderCost(j);
  } catch (_) {}
}

$("#cost-reset").addEventListener("click", async () => {
  await fetch("/api/cost/reset", {method: "POST"});
  refreshCost();
});

refreshCost();
setInterval(refreshCost, 2000);

async function loadSavedReports() {
  try {
    const r = await fetch("/api/reports");
    if (!r.ok) return;
    const j = await r.json();
    state.savedReports = j.reports || [];
    const row = $("#saved-row");
    const select = $("#saved-reports");
    select.innerHTML = "";
    for (const report of state.savedReports) {
      const opt = document.createElement("option");
      opt.value = report.job_id;
      const when = report.updated_at ? new Date(report.updated_at).toLocaleString() : report.job_id;
      opt.textContent = `${when} · ${report.companies.join(", ")}${report.done ? "" : " · running"}`;
      select.appendChild(opt);
    }
    row.style.display = state.savedReports.length ? "flex" : "none";
    if (state.savedReports.length && !state.jobId) {
      select.value = state.savedReports[0].job_id;
      await loadSelectedSavedReport();
    }
  } catch (_) {}
}

async function loadSelectedSavedReport() {
  const jobId = $("#saved-reports").value;
  if (!jobId) return;
  const r = await fetch(`/api/reports/${jobId}?include_events=1`);
  if (!r.ok) return;
  const j = await r.json();
  state.jobId = j.job_id;
  state.results = j.results || {};
  state.running = !j.done;
  state.eventCount = (j.events || []).length;
  $("#tabs-companies").innerHTML = "";
  $("#progress").style.display = "block";
  $("#progress").innerHTML = "";
  for (const c of (j.companies || Object.keys(state.results))) addCompanyTab(c);
  const first = (j.companies || Object.keys(state.results))[0];
  if (first) selectCompany(first);
  appendConsole("[saved]", `Loaded saved report ${jobId}`);
  replayEvents(j.events || []);
  updateStatus(state.running ? "Saved job is still marked running. Refreshing result…" : "");
  if (!j.done) {
    openEventStream(jobId, state.eventCount);
  }
}

function replayEvents(events) {
  const latestStatus = {};
  for (const ev of events) {
    if (ev.type === "progress") {
      appendConsole(`[${ev.company}] ${ev.stage}`, summarize(ev.data), ev.data && ev.data.error);
      latestStatus[ev.company] = ev.stage;
    } else if (ev.type === "cost_update") {
      onCostUpdate(ev);
    } else if (ev.type === "company_done") {
      latestStatus[ev.company] = "ready";
    } else if (ev.type === "company_error") {
      appendConsole(`[${ev.company}] error`, ev.error || "Report failed", true);
      latestStatus[ev.company] = "error";
    } else if (ev.type === "retry_started") {
      appendConsole(`[${ev.company}] retry`, "Manual retry started");
      latestStatus[ev.company] = "retrying";
    } else if (ev.type === "all_done") {
      appendConsole("[done]", "All companies complete");
    }
  }
  for (const [company, status] of Object.entries(latestStatus)) {
    setStatus(company, status);
  }
}

loadSavedReports();
</script>
</body>
</html>
